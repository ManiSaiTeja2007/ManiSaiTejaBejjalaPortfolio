<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning Platform - Mani Sai Teja Bejjala</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f8fafc;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        body.dark {
            background-color: #1a202c;
            color: #e2e8f0;
        }
        /* Dark mode specific styles for various elements */
        body.dark .nav-link {
            color: #cbd5e1;
        }
        body.dark .nav-link:hover {
            color: #60a5fa;
        }
        body.dark .text-gray-900 {
            color: #e2e8f0;
        }
        body.dark .text-gray-800 {
            color: #e2e8f0;
        }
        body.dark .text-gray-600 {
            color: #a0aec0;
        }
        body.dark .border-blue-200 {
            border-color: #4a5568;
        }
        body.dark .bg-white {
            background-color: #2d3748;
        }
        body.dark .bg-gray-100 {
            background-color: #2d3748;
        }
        body.dark .shadow-md {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.15);
        }
        body.dark .text-blue-600 {
            color: #60a5fa;
        }
        body.dark .bg-blue-600 {
            background-color: #3b82f6;
        }
        body.dark .hover\:bg-blue-700:hover {
            background-color: #2563eb;
        }
    </style>
    <script>
        // Set up Tailwind CSS for dark mode
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        // Define any custom colors if needed
                    }
                }
            }
        }

        // Function to toggle dark mode
        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            // Store user preference in local storage
            if (document.body.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        }

        // Apply theme on page load
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.add('dark');
            }
        });
    </script>
</head>
<body class="text-gray-900">
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
